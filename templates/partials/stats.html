<div class="flex flex-wrap items-center gap-3">
  <div class="rounded-lg border border-neutral-800 bg-neutral-900/50 px-4 py-2">
    <div class="text-2xl font-semibold leading-none">{{ stats.triage }}</div>
    <div class="text-xs text-neutral-500 mt-1">in triage queue</div>
  </div>
  <div class="rounded-lg border border-neutral-800 bg-neutral-900/50 px-4 py-2">
    <div class="text-2xl font-semibold leading-none">{{ stats.total }}</div>
    <div class="text-xs text-neutral-500 mt-1">roles tracked</div>
  </div>
  <div class="flex flex-wrap items-center gap-1.5 text-xs">
    {% for name, count in stats.funnel %}
      <span class="px-2 py-1 rounded-full border border-neutral-800 bg-neutral-900 text-neutral-300">
        {{ name }} <span class="text-neutral-500">·</span> <b class="text-neutral-100">{{ count }}</b>
      </span>
    {% endfor %}
  </div>
</div>
