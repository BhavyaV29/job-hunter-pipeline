name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Declared syntax floor plus the Python used by the container image.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --locked --extra web --extra dev
      - name: Run tests
        run: uv run --locked --extra web --extra dev pytest -q
      - name: Import smoke (app boots)
        run: uv run --locked --extra web python -c "import server, tracker_store, profile_config; print('ok')"
