# Render blueprint — a safe-by-default, read-only public demo on Render's free
# plan. To run a private live tracker, explicitly set DEMO_MODE=0 and use the
# generated ADMIN_TOKEN.
#
# Render's free filesystem is ephemeral. Docker's VOLUME declaration does not
# provision a Render disk, so browser-saved settings and tracker.csv can disappear
# after a restart/redeploy. Keep secrets in Render environment variables and the
# tracker in Google Sheets, use Docker Compose/Fly with a volume, or manually add a
# paid Render persistent disk at /data. This blueprint intentionally creates no
# paid resources. The free plan also sleeps, so use an external authenticated cron
# instead of ENABLE_SCHEDULER if you opt into live mode.
services:
  - type: web
    name: job-hunter-pipeline
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: NAUKRI_SKIP_PLAYWRIGHT
        value: "1"
      - key: ADMIN_TOKEN
        generateValue: true
