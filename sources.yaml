  # - { name: Zomato,     ats: greenhouse, token: zomato }      # eternal.com custom portal
  # - { name: Dunzo,      ats: lever,      token: dunzo }       # site offline / ATS moved
  # - { name: Hasura,     ats: greenhouse, token: hasura }      # rebranded to PromptQL

  # ---- Workable / Recruitee (uncomment + add tokens) ----
  # - { name: Example,   ats: workable,   token: example }
  # - { name: Example,   ats: recruitee,  token: example }

# ---- Aggregator APIs ------------------------------------------------------
# Cross-employer job indexes (free, no-auth except Adzuna). These surface the
# same fresher/new-grad roles found on LinkedIn / Indeed / Naukri / Wellfound,
# but via legitimate JSON APIs - we do NOT scrape those four sites directly
# (their ToS forbid it, they're aggressively anti-bot, and it risks a ban).
#
# If you delete this whole block, fetch_jobs.py falls back to built-in defaults.
aggregators:
  # ---- keyless, always-on (global remote / EU-heavy) ----
  - source: themuse           # free, no key; great for entry-level
    categories: ["Software Engineering", "Data Science", "Data and Analytics", "Computer and IT"]
    levels: ["Entry Level"]
    pages: 3
  - source: remotive          # free; one daily feed request, filtered locally
  - source: remoteok          # free; global remote listings
  - source: arbeitnow         # free; EU startup/tech board
    pages: 2
  - source: weworkremotely    # free RSS; global remote startups (programming + devops)
  - source: himalayas         # official API; country/timezone restrictions are structured
    country: "IN"
    seniority: "Entry-level,Mid-level"
    employment_type: "Full Time"
    pages: 1
    queries: ["backend engineer", "platform engineer", "ai engineer"]
  - source: jobicy            # official API; one APAC + one worldwide request
    geos: ["apac", ""]
    industry: dev
    count: 100
  - source: hn_hiring         # official monthly thread; direct founder/employee posts

  # ---- public / guest endpoints of consumer platforms (NO login, polite) ----
  - source: linkedin_guest    # public LinkedIn jobs-guest cards (no auth)
    locations: ["India", "Worldwide"]   # Worldwide = more global/remote startup hits
    queries:
      - "software engineer"
      - "backend developer"
      - "machine learning engineer"
      - "sde"
      - "python developer"
      - "remote software engineer startup"
      - "backend developer remote"
    experience_levels: "1,2,3"  # 1=internship 2=entry 3=associate (interns dropped by title filter)
    pages: 2                  # 10 cards/page; keep small + polite
  - source: naukri            # jobapi → RSS → Playwright → JSearch → SerpApi
    experience: 0
    keywords:
      - "software engineer fresher"
      - "backend developer entry level"
      - "sde fresher bangalore"
      - "machine learning engineer fresher"
      - "graduate software engineer"
      - "python developer fresher"
    results_per_keyword: 40
    jsearch_query_batch_size: 1
    serpapi_query_batch_size: 1
    serpapi_queries:
      - "site:naukri.com inurl:job-listings backend developer bangalore"
      - "site:naukri.com inurl:job-listings software engineer india"
      - "site:naukri.com inurl:job-listings machine learning fresher"
  - source: hirist            # API → Playwright → budgeted SerpApi fallback
    keywords:
      - "software engineer fresher"
      - "backend developer entry"
      - "machine learning fresher"
      - "python developer"
      - "golang developer"
    pages: 2
    serpapi_query_batch_size: 1
    serpapi_queries:
      - "site:hirist.com/j/ backend developer bangalore"
      - "site:hirist.com/j/ software engineer india"
      - "site:hirist.com/j/ machine learning engineer"
  - source: cutshort          # city __NEXT_DATA__ pages (HTTP, no key)
    serpapi_query_batch_size: 1
    city_paths:
      - /jobs/backend-developer-jobs-in-bangalore-bengaluru
      - /jobs/machine-learning-ml-jobs-in-bangalore-bengaluru
      - /jobs/software-engineer-jobs-in-bangalore-bengaluru
      - /jobs/backend-developer-jobs-in-delhi-ncr-gurgaon-noida
      - /jobs/backend-developer-jobs-in-pune
      - /jobs/fresher-jobs-in-bangalore-bengaluru
  - source: wellfound         # Playwright first, budgeted SerpApi fallback
    serpapi_query_batch_size: 1
    serpapi_queries:
      - "site:wellfound.com/jobs backend engineer india"
      - "site:wellfound.com/jobs software engineer bangalore startup"
      - "site:wellfound.com/jobs machine learning engineer india"
      - "site:wellfound.com/jobs sde fresher india"
      - "site:wellfound.com/jobs seed stage backend india"
      - "site:wellfound.com/jobs series a software engineer bangalore"
      - "site:wellfound.com/jobs remote backend engineer europe"
      - "site:wellfound.com/jobs remote software engineer worldwide startup"

  # ---- OPTIONAL keyed sources (cooldown + cache + hard provider budgets) ----
  - source: jsearch           # OPTIONAL - needs RAPIDAPI_KEY. Aggregates Google for
    num_pages: 1              #   Jobs => LinkedIn / Indeed / Glassdoor / ZipRecruiter.
    date_posted: week         #   all|today|3days|week|month
    query_batch_size: 2       # persistent round-robin; never run all queries at once
    queries:
      - "software engineer fresher in India"
      - "backend developer entry level in India"
      - "machine learning engineer fresher in India"
      - "graduate software engineer India"
      - "junior software engineer remote"
      - "backend engineer entry level remote"
      - "junior software engineer remote worldwide"
      - "backend developer remote europe startup"
      - "entry level software engineer remote global"
      - "startup software engineer bangalore"
      - "series a ml engineer india"
      - "fintech backend developer india"
      - "seed stage backend engineer india"
      - "early employee software engineer bangalore"
  - source: adzuna            # OPTIONAL - needs ADZUNA_APP_ID / ADZUNA_APP_KEY
    # Free tier (official ToS): 25/min, 250/day, 2500/month — keep this block tiny.
    # Use gb as an index only; queries target worldwide / work-from-anywhere remote
    # (geo.py still drops US-only / region-locked remote after fetch).
    countries: ["gb"]
    max_calls: 4
    queries:
      - "remote software engineer work from anywhere"
      - "remote backend developer worldwide"
      - "junior software engineer remote global"
      - "machine learning engineer remote worldwide"
    results_per_page: 40
