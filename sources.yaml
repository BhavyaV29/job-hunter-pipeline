# Target companies for the Tier-1 sourcing pipeline.
# Each company: which ATS it uses + its board "token" (the slug in its careers URL).
#
# How to find a token (open the URL, the last path segment is the token):
#   greenhouse : boards.greenhouse.io/<token>   or job-boards.greenhouse.io/<token>
#   lever      : jobs.lever.co/<token>
#   ashby      : jobs.ashbyhq.com/<token>
#   workable   : apply.workable.com/<token>
#   recruitee  : <token>.recruitee.com
#
# The list below is a STARTER set - some tokens may be wrong/moved; the pipeline
# skips failures and reports them so you can fix or drop them. Add YOUR real targets
# (especially India startups + the companies on your outreach/targets.md list).

# ---- Per-person tuning (profile) ------------------------------------------
# This stays a TECHNICAL job hunter, but every knob that differs person-to-person
# lives here, so you retune it to YOUR search without editing any Python.
# An absent block == the fresher defaults below (behaviour is unchanged).
# Read by profile_config.py -> experience.py (bands), fresher_filter.py
# (senior-title drop) and score.py (keyword / boost weights).
profile:
  # Seniority preset -> experience bands + whether senior titles are dropped:
  #   fresher | junior | mid | senior
  # For mid/senior, ALSO relax the fetch-time gates in `filters` below
  # (title_exclude, max_exp_years, title_include) or good roles get dropped
  # before they are ever scored.
  seniority: fresher

  # --- Optional explicit overrides (win over the preset). Uncomment to tune. ---
  # exp_good_max: 1          # required YOE <= this  -> "good"
  # exp_warn_max: 2          # required YOE <= this  -> "warn"  (else "bad")
  # drop_senior_titles: true # hard-drop senior/staff/principal/lead at fetch
  # max_exp_years: 2         # drop roles requiring more than this (null = keep all)

  # Stack keywords to BOOST in ranking (title match). When present this REPLACES
  # the built-in set, so list every keyword you want counted.
  # boost_keywords:
  #   backend: 5
  #   python: 3
  #   kubernetes: 4
  #   "machine learning": 3

  # Title signals to PENALIZE (a fresher avoids these; a senior would flip them).
  # negative_keywords:
  #   senior: -6
  #   staff: -7
  #   intern: -4

  # Geography boosts (city / region -> points). Retune for where you want to work.
  # location_boosts:
  #   bengaluru: 10
  #   remote: 2

  # Experience-match score adjustments by class.
  # exp_match_adjust: { good: 5, warn: -10, bad: -30, unknown: 0 }

  # Scalar score weights (defaults shown).
  # remote_boost: 8
  # brand_a_boost: 10
  # brand_b_boost: 5
  # dream_boost: 15
  # official_apply_boost: 25
  # shortlisted_boost: 15

# ---- Filtering: edit freely. A role is kept if its title matches an include
#      keyword, has no exclude keyword, and (if location_include is non-empty)
#      its location matches one of those substrings. All case-insensitive. ----
filters:
  # ---- Salary floors (lakhs/annum). A role is dropped ONLY if it advertises a
  #      salary we can parse to an annual-INR figure BELOW its floor. Roles with
  #      missing/unparseable salary are KEPT (no-salary + good-company roles are
  #      intentionally retained — "decent company, benefit of the doubt"). Non-INR
  #      salaries are converted with the approximate FX constants near the top of
  #      fetch_jobs.py.
  #        min_salary_lpa    — floor for India ONSITE roles (default 10).
  #        remote_floor_lpa  — floor for India-eligible REMOTE roles (default 7;
  #                            remote pay runs lower but is still worth keeping).
  #      See the 4-tier ranking in score.py (T1 remote>=10 > T2 onsite>=10 >
  #      T3 remote 7-10 > T4 unknown). ----
  min_salary_lpa: 10
  remote_floor_lpa: 7
  expiry_warn_days: 7      # T1/T2 roles expiring within this window get urgency boost + CLOSING SOON
  # Fresher profile (~6 months exp): drop senior roles and 3+ yr requirements at fetch time.
  drop_exp_bad: true
  max_exp_years: 2
  prune_over_experience: true     # also clean EXISTING sourced rows that exceed the above (senior title or > max_exp_years)
  # Dedup: keep every genuinely distinct posting; collapse only TRUE duplicates
  # (same canonical URL, or identical company+role+location).
  dedup_use_location: true        # true (default) = same role in different cities stays a separate row; false = merge city re-listings
  # Dead-link check: HTTP-verify tracker URLs and set link_status = live/dead/expired.
  check_links: true               # run during fetch (cached in .linkcheck_cache.json; re-runs are cheap)
  link_check_drop_dead: true      # true (default) = REMOVE dead/expired sourced rows (never UNKNOWN, never applied/advanced); false = only mark link_status
  link_check_concurrency: 8       # max in-flight requests overall
  link_check_per_host_delay: 1.0  # seconds between requests to the SAME host (be polite)
  link_check_timeout: 15
  link_check_ttl_days: 7          # re-check a live URL after this many days
  link_check_dead_ttl_days: 30    # re-check a dead/expired URL after this many days
  # Do NOT auto-remove rows from tracker unless YOU mark not_applicable in Sheet.
  drop_expired_at_fetch: true
  auto_prune_geo_failures: true   # remove US-onsite / remote-US rows; keeps global/USD remote
  title_include:
    - backend
    - "back end"
    - software engineer
    - "software engineer 1"
    - software developer
    - platform
    - infrastructure
    - distributed
    - "site reliability"
    - sre
    - "machine learning"
    - "ml engineer"
    - "ai engineer"
    - "applied ai"
    - golang
    - python
    # ---- fresher / new-grad / entry-level signals (engineering-anchored to
    #      avoid matching e.g. "Support Associate" / "Scheduling Coordinator") ----
    - "new grad"
    - "new graduate"
    - "graduate engineer"
    - "graduate software"
    - "graduate developer"
    - "entry level software"
    - "entry-level software"
    - "associate software"
    - "associate engineer"
    - "associate developer"
    - "junior software"
    - "junior developer"
    - "junior engineer"
    - fresher
    - trainee
    - "early career"
    - "campus"
    - sde
    - "sde 1"
    - "sde i"
    - "sde-1"
    - "software engineer i"
    - mle
    - "0-1 years"
    - "0 to 1"
    - "6 months"
    - "associate software engineer"
  title_exclude:
    - senior
    - "sr."
    - "sr "
    - staff
    - principal
    - lead
    - manager
    - director
    - intern            # drops LinkedIn f_E=1 internships + "internship" titles
    - "vice president"
    - vp
    - head of
    - architect         # typically senior (incl. "solutions architect")
    # seniority by level marker (keep SDE 1 / Engineer I, drop II/III/IV)
    - " ii"
    - " iii"
    - " iv"
    - "sde 2"
    - "sde-2"
    - "sde ii"
    - "level 2"
    # non-engineering noise
    - "account executive"
    - sales
    - recruiter
    - marketing
    - designer
    - counsel
    - finance
    - accountant
    - "customer success"
    - "technical support"
    - coordinator
    - "supply chain"
    - "support associate"
    - "account manager"
    - consultant
    - "5+ years"
    - "5 years"
    - "3+ years"
    - "4+ years"
    - "minimum 3"
    - "minimum 4"
    - "minimum 5"
  location_include:        # empty list = allow all locations
    # Bias hard toward India + remote. US/EU onsite excluded by passes_geo_salary()
    # at filter time — do NOT add "united states", "emea", etc. here.
    # "remote" catches "US - Remote", "Remote-USA", etc. without letting through
    # US-onsite roles (those get geo_drop'd by passes_geo_salary).
    - remote
    - worldwide          # common remote-board phrasing (Remotive/RemoteOK)
    - anywhere
    - global
    - india
    - bangalore
    - bengaluru
    - gurgaon
    - gurugram
    - hyderabad
    - pune
    - delhi
    - noida
    - mumbai
    - chennai
    - kolkata
    - chandigarh
    - jaipur
    - ahmedabad
    - kochi
    - karnataka
    - telangana
    - maharashtra
    - haryana

# Shared hard limits apply across every logical route using the same provider.
# `--force` never bypasses these limits. Environment variables with the same
# names documented in .env.example can override the defaults.
provider_limits:
  serpapi:
    monthly_budget: 45
    max_calls_per_run: 2
    cache_ttl_hours: 72
  jsearch:
    monthly_budget: 120
    max_calls_per_run: 2
    cache_ttl_hours: 24

# Personal priority targets — modest desirability boost in score.py.
dream_companies:
  - razorpay
  - postman
  - cred
  - meesho
  - groww
  - phonepe
  - slice
  - chargebee
  - stripe
  - databricks
  - linear
  - inmobi
  - quantiphi
  - wissen

companies:
  # ---- Greenhouse (high-confidence starters) ----
  - { name: Stripe,      ats: greenhouse, token: stripe }
  - { name: Databricks,  ats: greenhouse, token: databricks }
  - { name: Coinbase,    ats: greenhouse, token: coinbase }
